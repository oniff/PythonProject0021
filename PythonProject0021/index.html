<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>酒店评论情感分析与文本挖掘系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#1a1a2e;color:#eee;font-family:Microsoft YaHei,sans-serif;padding:30px}
        .container{max-width:1200px;margin:0 auto}
        .title{text-align:center;color:#4fc3f7;margin-bottom:24px}

        /* 单条评论分析样式 */
        .single-analyze{background:#252941;padding:24px;border-radius:12px;margin-bottom:24px;border:1px solid #333858}
        .single-analyze h3{color:#4fc3f7;margin-bottom:12px}
        .input-group{display:flex;gap:12px}
        .input-group input{flex:1;padding:12px;background:#1a1a2e;border:1px solid #4fc3f7;border-radius:6px;color:#fff;font-size:14px}
        .input-group input:focus{outline:none;box-shadow:0 0 8px #4fc3f7}
        .result-box{margin-top:12px;padding:12px;border-radius:6px;background:#1a1a2e;display:none;font-weight:bold}

        /* 统计卡片大盘 */
        .stat{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
        .card{background:#252941;padding:20px;border-radius:12px;text-align:center;border:1px solid #333858}
        .card h3{font-size:16px;color:#b0bec5;margin-bottom:8px}
        .card .num{font-size:28px;font-weight:bold;color:#4fc3f7}

        /* 图表大盘排版 */
        .charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
        .chart{background:#252941;border-radius:12px;padding:16px;text-align:center;border:1px solid #333858}
        .chart h3{margin-bottom:12px;color:#eee}
        .chart img{width:100%;border-radius:8px}

        /* 组件与交互按钮 */
        .upload-section{background:#252941;padding:24px;border-radius:12px;margin-bottom:24px;border:1px solid #333858}
        .upload-section h3{margin-bottom:16px;color:#4fc3f7}
        .btn{padding:10px 20px;background:#2196f3;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:bold;transition:all 0.3s}
        .btn:hover{background:#1976d2;transform:translateY(-2px)}
        .btn-success{background:#00C851}
        .btn-success:hover{background:#007e33}

        /* 明细账单数据表格 */
        .table-container{background:#252941;border-radius:12px;padding:20px;margin-top:24px;overflow-x:auto;border:1px solid #333858;display:none}
        .table-container h3{color:#4fc3f7;margin-bottom:12px}
        table{width:100%;border-collapse:collapse;margin-top:10px}
        th,td{padding:12px;text-align:left;color:white;border-bottom:1px solid #333858}
        th{background:#1a1a2e;color:#4fc3f7}
        tr:nth-child(even){background:#2c314e}
    </style>
</head>
<body>
<div class="container">
    <h1 class="title">酒店评论情感分析可视化系统</h1>

    <div class="single-analyze">
        <h3>单条评论敏捷诊断</h3>
        <div class="input-group">
            <input type="text" id="singleComment" placeholder="请输入任意住客的酒店口语化评论（如：房间太脏了，根本不能住！）...">
            <button class="btn" onclick="analyzeSingleComment()">即时分析</button>
        </div>
        <div id="singleResult" class="result-box"></div>
    </div>

    <div class="stat">
        <div class="card"><h3>正面评论</h3><div class="num" id="pos_cnt">0</div></div>
        <div class="card"><h3>中性评论</h3><div class="num" id="neu_cnt">0</div></div>
        <div class="card"><h3>负面评论</h3><div class="num" id="neg_cnt">0</div></div>
        <div class="card"><h3>大盘总数</h3><div class="num" id="total_cnt">0</div></div>
    </div>

    <div style="text-align:center; margin-bottom:24px;">
        <button class="btn btn-success" onclick="exportData('excel')">📊 导出 Excel 明细账单</button>
        <button class="btn btn-success" onclick="exportData('pdf')">📕 导出 300DPI PDF 可视化报告</button>
    </div>

    <div class="charts">
        <div class="chart"><h3>情感占比</h3><img id="pie_img" src=""></div>
        <div class="chart"><h3>情感数量统计</h3><img id="bar_img" src=""></div>
    </div>

    <div class="chart" style="margin-bottom:24px;">
        <h3>全局关键词词云拓扑</h3>
        <img id="wc_img" src="" style="max-height:400px; object-fit:contain;">
    </div>

    <div class="upload-section">
        <h3>批量流预测（上传标准 CSV 文件）</h3>
        <input type="file" id="csvFile" accept=".csv" style="color:white; margin-bottom:15px;"><br>
        <button class="btn" onclick="uploadCSVFile()">开始批量吞吐预测</button>
    </div>

    <div class="table-container" id="tableContainer">
        <h3>批量微调预测明细矩阵</h3>
        <table id="detailsTable">
            <thead>
                <tr id="tableHeader"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const BACKEND_URL = "http://127.0.0.1:8000";

    // 页面初始化：秒读大盘基本面数据
    window.onload = async function() {
        try {
            const res = await fetch(`${BACKEND_URL}/api/init`);
            const data = await res.json();
            updateDashboard(data);
        } catch(e) {
            console.error("后端连接未就位:", e);
        }
    }

    function updateDashboard(data) {
        document.getElementById("pos_cnt").innerText = data.pos_num;
        document.getElementById("neu_cnt").innerText = data.neu_num;
        document.getElementById("neg_cnt").innerText = data.neg_num;
        document.getElementById("total_cnt").innerText = data.total;
        document.getElementById("pie_img").src = "data:image/png;base64," + data.pie_base64;
        document.getElementById("bar_img").src = "data:image/png;base64," + data.bar_base64;
        document.getElementById("wc_img").src = "data:image/png;base64," + data.wc_base64;
    }

    // 🌟 1. 异步处理单条评论预测
    async function analyzeSingleComment() {
        const comment = document.getElementById("singleComment").value.strip ? document.getElementById("singleComment").value.strip() : document.getElementById("singleComment").value;
        const resultBox = document.getElementById("singleResult");
        if(!comment){ alert("请输入评论内容！"); return; }

        const formData = new FormData();
        formData.append("review", comment);

        const res = await fetch(`${BACKEND_URL}/api/analyze_single`, { method: "POST", body: formData });
        const data = await res.json();

        if(data.status === "success") {
            resultBox.style.display = "block";
            resultBox.style.color = data.color;
            resultBox.innerText = `诊断结论：该条评论属于【${data.sentiment}】情绪。`;
        }
    }

    // 🌟 2. 异步上传并无缝绘制表格明细
    async function uploadCSVFile() {
        const fileInput = document.getElementById("csvFile");
        if(fileInput.files.length === 0){ alert("请先选择一个 .csv 文件！"); return; }

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        const res = await fetch(`${BACKEND_URL}/api/upload_csv`, { method: "POST", body: formData });
        const data = await res.json();

        // 刷新图表与核心大盘
        updateDashboard(data);

        // 动态生成表格数据明细
        if(data.details && data.details.length > 0) {
            const keys = Object.keys(data.details[0]);
            const headerRow = document.getElementById("tableHeader");
            headerRow.innerHTML = keys.map(k => `<th>${k}</th>`).join("");

            const body = document.getElementById("tableBody");
            body.innerHTML = data.details.map(row => {
                return `<tr>${keys.map(k => `<td>${row[k]}</td>`).join("")}</tr>`;
            }).join("");

            document.getElementById("tableContainer").style.display = "block";
        }
    }

    function exportData(type) {
        window.open(`${BACKEND_URL}/export/${type}`);
    }
</script>
</body>
</html>
